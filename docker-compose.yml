services:
  api:
    build: .
    ports:
      - "8000:8000"
    depends_on:
      - postgres
  postgres:
    image: postgres:17-alpine
    container_name: savoria-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5400:5432"
    volumes:
      - postgres_savoria:/var/lib/postgresql/data

volumes:
  postgres_savoria: